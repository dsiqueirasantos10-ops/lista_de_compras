<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de Compras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/style.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #6d6d6d, #868686);
            min-height: 100vh;
        }

        .container {
            background-color: rgba(233, 233, 226, 0.774);
            box-shadow: rgba(0, 0, 0, 0.4) 0px 2px 4px, rgba(0, 0, 0, 0.3) 0px 7px 13px -3px, rgba(0, 0, 0, 0.2) 0px -3px 0px inset;
            padding: 2rem;
            border-radius: 1rem;
        }

        .form-label {
            font-weight: 500;
        }

        
    </style>


</head>

<body class="p-3">

    <div class="container mb-4">
        <form class="row g-2 align-items-end" id="formProduto">

            <!-- Campo de texto -->
            <div class="col-12 col-md-8">
                <label class="form-label">Produto:</label>
                <input type="text" class="form-control" id="produto" placeholder="Digite aqui...">
            </div>

            <!-- Botões -->
            <div class="col-12 col-md-4 d-flex gap-2">
                <button type="submit" class="btn btn-success w-100">Add</button>
                <button type="button" class="btn btn-danger w-100" id="btnLimpar">Clear</button>
            </div>

        </form>
    </div>

    <div class="container" id="listaProdutos">
